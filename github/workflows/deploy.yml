name: Deploy to Modal

on:
  push:
    branches:
      - main # Change this to your default branch name if it's 'master'
    paths:
      - 'chatterboxtts.py' # Only runs if this specific file changes

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Matches a standard Python environment

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install modal python-dotenv

      - name: Deploy to Modal
        run: |
          python -m modal deploy chatterboxtts.py
        env:
          MODAL_TOKEN_ID: ${{ secrets.MODAL_TOKEN_ID }}
          MODAL_TOKEN_SECRET: ${{ secrets.MODAL_TOKEN_SECRET }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}